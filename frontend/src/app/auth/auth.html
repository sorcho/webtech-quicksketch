<h3 class="font-bold text-center">LOGIN</h3>

<form class="bg-pink-200 h-screen flex flex-col items-center justify-center ">
    <div>
        <label for="username">Username:</label> <br>
        <input class="border-black border-2 hover:cursor-text" type="text" name="username" id="username">
    </div>
    <div>
        <label for="password">Password</label> <br>
        <input class="border-black border-2 hover:cursor-text" type="password" name="password" id="password">
    </div>
    <div class="p-2">
        <input type="submit" value="Login" class="duration-75 transform hover:scale-105 hover:cursor-pointer transition ease-linear bg-white px-6 py-2 m-4">
    </div>
</form>
